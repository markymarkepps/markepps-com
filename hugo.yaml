baseURL: https://markepps.com/
languageCode: en-au
languageName: English
defaultContentLanguage: en
theme: LoveIt
title: Mark Epps
description: I'm Mark Epps. I like building things and solving problems
copyright: © 2025 Mark Epps. Content licensed under [CC BY-SA 4.0](http://creativecommons.org/licenses/by-sa/4.0/)

# LoveIt-specific Author configuration
author:
  name: Mark Epps
menu:
  main:
    - name: Projects
      url: /projects/
      weight: 2
      pre: '<i class="fas fa-code-branch"></i>'
    - name: Hobbies
      url: /hobbies/
      weight: 3
      pre: '<i class="fas fa-heart"></i>'
    - name: Experience
      url: /experience/
      weight: 4
      pre: '<i class="fas fa-briefcase"></i>'
    - name: Contact
      url: /contact/
      weight: 5
      pre: '<i class="fas fa-envelope"></i>'
params:
  seo:
    image: /favicon.svg # Sets a default image for link previews
  # The theme looks here for SEO and Footer data
  author:
    name: Mark Epps
    link: https://markepps.com

  # This replaces PaperMod's homeInfoParams
  home:
    profile:
      enable: true
      social: true
      subtitle: "Mark Epps"
      typeit: true
  header:
    title:
      name:
      pre: '<i class="fas fa-home"></i>'
  # LoveIt uses a 'social' block instead of 'socialIcons'
  social:
    github: markymarkepps
    instagram: markymarkepps

  # Theme behavior
  defaultTheme: auto
  app:
    title: "Mark Epps"
    svgFavicon: /favicon.svg
    themeColor: "#ffffff"
    iconColor: "#d32f2f"
    tileColor: "#d32f2f"
